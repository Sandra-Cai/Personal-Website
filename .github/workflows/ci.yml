name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify static assets
        run: |
          test -f index.html
          test -f assets/styles.css
          test -f assets/sandra-gpt.js
          test -f assets/script.js
          test -f robots.txt
          test -f sitemap.xml
          test -f 404.html
          test -f scripts/validate-jsonld.cjs
          test -f api/sandra-gpt.js
          test -f package.json

      - name: Install npm dependencies
        run: npm ci

      - name: Syntax-check JavaScript
        run: |
          node --check assets/sandra-gpt.js
          node --check assets/script.js
          node --check api/sandra-gpt.js

      - name: Validate JSON-LD in index.html
        run: node scripts/validate-jsonld.cjs
