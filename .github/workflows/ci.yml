name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Verify static assets
        run: |
          test -f index.html
          test -f assets/styles.css
          test -f assets/sandra-gpt.js
          test -f assets/script.js
          test -f robots.txt
          test -f sitemap.xml
          test -f 404.html
          test -f scripts/validate-jsonld.cjs
          test -f scripts/verify-all.cjs
          test -f api/sandra-gpt.js
          test -f vercel.json
          test -f package.json
          test -f .well-known/security.txt

      - name: Install npm dependencies
        run: npm ci

      - name: Verify site (JSON-LD + JS syntax)
        run: npm run verify
